<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Vetamerikan Shift Asistan</title>
  <style>
    :root {
      --ink: #14213d;
      --muted: #667085;
      --line: #d9dee8;
      --paper: #f6f8fb;
      --panel: #fff;
      --brand: #0f6c74;
      --morning: #f7c948;
      --evening: #ef8354;
      --midshift: #9b5de5;
      --night: #4b5bbf;
      --icap: #83c8dc;
      --off: #8a4fff;
      --soft: #e8f5f5;
      --shadow: 0 10px 26px rgba(20, 33, 61, .09);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
      letter-spacing: 0;
      overflow: hidden;
    }
    button, input, select { font: inherit; }
    body.locked .app,
    body.locked .drawer,
    body.locked .drawer-backdrop,
    body.locked .code-menu,
    body.locked .code-menu-backdrop {
      display: none !important;
    }
    .auth-screen {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    body:not(.locked) .auth-screen {
      display: none;
    }
    .auth-screen.register-mode .login-copy,
    .auth-screen.register-mode #authLoginButton,
    .auth-screen.register-mode #showRegisterButton,
    .auth-screen:not(.register-mode) .register-copy,
    .auth-screen:not(.register-mode) #createAccountButton,
    .auth-screen:not(.register-mode) #showLoginButton {
      display: none;
    }
    .auth-card {
      width: min(420px, 100%);
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
    }
    .auth-card h1 {
      font-size: 22px;
    }
    .auth-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    .auth-card input,
    .auth-card button {
      width: 100%;
      min-height: 48px;
      border-radius: 8px;
      font-weight: 800;
    }
    .auth-card input {
      border: 1px solid var(--line);
      background: #fbfcfe;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }
    .auth-card button {
      border: 1px solid var(--brand);
      background: var(--brand);
      color: #fff;
    }
    .auth-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .auth-card .secondary-auth {
      border-color: var(--line);
      background: #fbfcfe;
      color: var(--ink);
    }
    .auth-error {
      min-height: 18px;
      color: #b42318;
      font-size: 12px;
      font-weight: 800;
    }
    .app {
      height: 100svh;
      max-width: 760px;
      margin: 0 auto;
      padding: 12px 12px 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .top {
      z-index: 10;
      flex: 0 0 auto;
      margin: -12px -12px 12px;
      padding: 12px;
      background: rgba(246, 248, 251, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }
    .brand {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .brand-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1 1 260px;
      justify-content: flex-end;
    }
    .user-badge {
      min-height: 32px;
      max-width: 150px;
      min-width: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    @media (max-width: 430px) {
      .brand {
        align-items: flex-start;
        gap: 10px;
      }
      .brand h1 {
        flex: 1 1 120px;
      }
      .brand-actions {
        flex: 1 1 210px;
        gap: 8px;
      }
      .month-select {
        flex: 1 1 auto;
        max-width: none;
      }
      .user-badge {
        flex: 0 1 auto;
        max-width: 128px;
      }
      .app-title {
        font-size: 19px;
      }
    }
    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      text-align: center;
      flex: 1 1 220px;
      min-width: 0;
    }
    .app-title {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--ink);
      padding: 0;
      font-family: Arial, Helvetica, "Segoe UI", sans-serif;
      font-size: 19px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 0;
      text-align: left;
      cursor: pointer;
    }
    .auth-card h1 {
      font-family: Arial, Helvetica, "Segoe UI", sans-serif;
      font-weight: 900;
      letter-spacing: 0;
    }
    .month { color: var(--muted); font-size: 13px; white-space: nowrap; }
    .month-select {
      min-height: 36px;
      max-width: 190px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 8px;
      font-size: 13px;
      font-weight: 800;
    }
    .search {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 10px;
    }
    .search input, .search button, .day, .shift-tab {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
    }
    .search input { width: 100%; padding: 0 12px; outline: none; }
    .search button { padding: 0 12px; font-weight: 800; }
    .day-strip {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 48px;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .day-strip::-webkit-scrollbar { display: none; }
    .day {
      height: 52px;
      display: grid;
      place-items: center;
      grid-template-rows: 1fr 1fr;
      padding: 5px 0;
      position: relative;
    }
    .day strong { font-size: 15px; line-height: 1; }
    .day span { color: var(--muted); font-size: 11px; }
    .day.today {
      border-color: var(--brand);
      box-shadow: inset 0 0 0 1px var(--brand);
    }
    .day.today::after {
      content: "";
      position: absolute;
      right: 6px;
      top: 6px;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--brand);
    }
    .day.active { color: #fff; background: var(--brand); border-color: var(--brand); }
    .day.active span { color: rgba(255, 255, 255, .82); }
    .day.active.today::after { background: #fff; }
    .shift-tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 7px;
      flex: 0 0 auto;
      margin: 12px 0 7px;
    }
    .service-tabs {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin: 0 0 12px;
    }
    .shift-tab {
      min-width: 0;
      padding: 8px 4px;
      display: grid;
      gap: 2px;
      place-items: center;
      font-weight: 900;
      font-size: 13px;
    }
    .shift-tab small {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }
    .shift-tab.active {
      color: #fff;
      border-color: transparent;
    }
    .shift-tab.active small { color: rgba(255, 255, 255, .78); }
    .shift-tab[data-shift="morning"].active { background: var(--morning); color: #2f2500; }
    .shift-tab[data-shift="morning"].active small { color: rgba(47, 37, 0, .70); }
    .shift-tab[data-shift="evening"].active { background: var(--evening); }
    .shift-tab[data-shift="night"].active { background: var(--night); }
    .shift-tab[data-shift="icap"].active { background: var(--icap); color: #123744; }
    .shift-tab[data-shift="icap"].active small { color: rgba(18, 55, 68, .72); }
    .shift-tab[data-shift="off"].active { background: var(--off); }
    .shift-tab[data-shift="KEDI_SERVIS"].active { background: #ffe3b3; color: #5f3700; }
    .shift-tab[data-shift="KEDI_SERVIS"].active small { color: rgba(95, 55, 0, .72); }
    .shift-tab[data-shift="KOPEK_SERVIS"].active { background: #d9edff; color: #123f62; }
    .shift-tab[data-shift="KOPEK_SERVIS"].active small { color: rgba(18, 63, 98, .72); }
    .shift-tab[data-shift="ENFEKSIYON"].active { background: #f8d2dc; color: #6f1f35; }
    .shift-tab[data-shift="ENFEKSIYON"].active small { color: rgba(111, 31, 53, .72); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .summary {
      flex: 0 0 auto;
      padding: 14px;
      margin-bottom: 12px;
      display: grid;
      gap: 8px;
    }
    .kicker {
      color: var(--brand);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .summary h2 {
      margin: 0;
      font-size: 23px;
      line-height: 1.15;
    }
    .today-badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      margin-left: 7px;
      padding: 0 7px;
      border-radius: 999px;
      background: var(--brand);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      vertical-align: middle;
    }
    .summary-title-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
    }
    .day-nav {
      display: inline-flex;
      gap: 12px;
    }
    .day-nav button {
      width: 48px;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      color: var(--ink);
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
      touch-action: manipulation;
    }
    .day-nav button:disabled {
      opacity: .38;
    }
    .summary-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 9px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #fbfcfe;
    }
    .section-title {
      margin: 0;
      padding: 12px 14px 8px;
      color: var(--brand);
      font-size: 13px;
      font-weight: 900;
      background: var(--soft);
      border-top: 1px solid var(--line);
    }
    .section-title:first-child { border-top: 0; }
    .doctor {
      min-height: 58px;
      padding: 10px 14px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .doctor:first-child { border-top: 0; }
    .doctor-name {
      border: 0;
      background: transparent;
      color: var(--ink);
      padding: 0;
      text-align: left;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }
    .doctor b {
      display: inline;
      font-size: 15px;
      line-height: 1.25;
    }
    .list-badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      margin-left: 6px;
      padding: 0 6px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 900;
      vertical-align: 1px;
    }
    .icap-badge {
      background: var(--icap);
      color: #123744;
    }
    .cat-badge {
      background: #ffe3b3;
      color: #5f3700;
    }
    .dog-badge {
      background: #d9edff;
      color: #123f62;
    }
    .infection-badge {
      background: #f8d2dc;
      color: #6f1f35;
    }
    .night-badge {
      background: var(--night);
      color: #fff;
    }
    .doctor small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }
    .code {
      min-width: 58px;
      min-height: 34px;
      padding: 0 8px;
      border-radius: 7px;
      display: inline-grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      font-size: 12px;
      text-align: center;
    }
    .code.morning { background: var(--morning); color: #2f2500; }
    .code.evening { background: var(--evening); }
    .code.night { background: var(--night); }
    .code.icap { background: var(--icap); color: #123744; }
    .code.off { background: var(--off); }
    .code-button {
      min-width: 82px;
      min-height: 36px;
      border: 0;
      border-radius: 7px;
      color: #fff;
      font-weight: 900;
      font-size: 12px;
      text-align: center;
      padding: 0 10px;
      touch-action: manipulation;
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .code-button.morning { background: var(--morning); color: #2f2500; }
    .code-button.evening { background: var(--evening); }
    .code-button.midshift { background: var(--midshift); }
    .code-button.night { background: var(--night); }
    .code-button.icap { background: var(--icap); color: #123744; }
    .code-button.off { background: var(--off); }
    .code-button.readonly {
      cursor: default;
      opacity: .82;
    }
    .empty {
      padding: 28px 18px;
      color: var(--muted);
      text-align: center;
    }
    #doctorList {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .app.profile-mode .shift-tabs,
    .app.profile-mode .summary,
    .app.profile-mode .search,
    .app.profile-mode .day-strip,
    .app.profile-mode #doctorList,
    .app.notification-mode .shift-tabs,
    .app.notification-mode .summary,
    .app.notification-mode .search,
    .app.notification-mode .day-strip,
    .app.notification-mode #doctorList {
      display: none;
    }
    .profile-view {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 14px;
      display: grid;
      align-content: start;
      gap: 14px;
    }
    .profile-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 14px;
    }
    .profile-head-main {
      display: grid;
      gap: 8px;
    }
    .profile-identity {
      min-width: 0;
      display: grid;
      gap: 8px;
    }
    .profile-photo {
      width: 108px;
      aspect-ratio: 1;
      border: 2px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(135deg, #e7f5f6, #f7fafc);
      color: var(--brand);
      display: grid;
      place-items: center;
      font-size: 30px;
      font-weight: 900;
      box-shadow: inset 0 0 0 6px #fff;
      flex: 0 0 auto;
    }
    .profile-back {
      justify-self: start;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      color: var(--ink);
      padding: 0 10px;
      font-weight: 900;
    }
    .profile-name {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }
    @media (max-width: 380px) {
      .profile-photo {
        width: 92px;
        border-radius: 16px;
        font-size: 26px;
      }
      .profile-head-main {
        gap: 10px;
      }
      .profile-head {
        gap: 10px;
      }
    }
    .profile-meta,
    .profile-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .profile-days {
      display: grid;
      gap: 8px;
    }
    .profile-day {
      min-height: 48px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-top: 1px solid var(--line);
    }
    .profile-day.today {
      padding: 8px 10px;
      border: 1px solid var(--brand);
      border-radius: 8px;
      background: var(--soft);
    }
    .profile-day:first-child { border-top: 0; }
    .profile-day.today:first-child { border-top: 1px solid var(--brand); }
    .profile-day strong {
      display: block;
      font-size: 14px;
      line-height: 1.2;
    }
    .profile-day small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }
    .profile-day-badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      margin-left: 6px;
      padding: 0 7px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      vertical-align: middle;
    }
    .profile-today-badge {
      background: var(--brand);
      color: #fff;
    }
    .profile-night-badge {
      background: var(--night);
      color: #fff;
    }
    .menu-button {
      min-width: 44px;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font-size: 22px;
      line-height: 1;
      font-weight: 900;
    }
    .notification-icon-button {
      position: relative;
      min-width: 44px;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      display: inline-grid;
      place-items: center;
    }
    .notification-icon-button svg {
      width: 21px;
      height: 21px;
      stroke: currentColor;
      stroke-width: 2.3;
      fill: none;
    }
    .notification-count {
      position: absolute;
      top: -7px;
      right: -7px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border: 2px solid var(--paper);
      border-radius: 999px;
      background: #d92d20;
      color: #fff;
      font-size: 10px;
      font-weight: 900;
      line-height: 16px;
      text-align: center;
    }
    .notification-count[hidden] {
      display: none;
    }
    .notification-list {
      display: grid;
      gap: 10px;
    }
    .notification-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--brand);
      border-radius: 8px;
      background: var(--panel);
      display: grid;
      gap: 4px;
    }
    .notification-item.unread {
      background: var(--soft);
      border-color: rgba(15, 108, 116, .34);
    }
    .notification-item strong {
      font-size: 14px;
    }
    .notification-item p {
      margin: 0;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.35;
    }
    .notification-time {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(20, 33, 61, .34);
    }
    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 50;
      width: min(360px, 92vw);
      height: 100svh;
      background: var(--panel);
      border-left: 1px solid var(--line);
      box-shadow: -18px 0 36px rgba(20, 33, 61, .18);
      transform: translateX(102%);
      transition: transform .2s ease;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .drawer.open {
      transform: translateX(0);
    }
    .code-menu-backdrop {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: rgba(20, 33, 61, .38);
    }
    .code-menu {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 70;
      max-width: 760px;
      margin: 0 auto;
      padding: 12px;
      background: var(--panel);
      border-radius: 8px 8px 0 0;
      box-shadow: 0 -18px 36px rgba(20, 33, 61, .18);
    }
    .code-menu-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .code-menu-head strong {
      font-size: 15px;
      line-height: 1.2;
    }
    .code-menu-close {
      min-width: 42px;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      color: var(--ink);
      font-size: 22px;
      line-height: 1;
    }
    .code-menu-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .code-menu-options.range-mode {
      grid-template-columns: 1fr;
    }
    .code-choice {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      color: var(--ink);
      font-weight: 900;
      touch-action: manipulation;
    }
    .code-choice.active {
      border-color: var(--brand);
      background: var(--soft);
      color: var(--brand);
    }
    .code-range {
      display: grid;
      gap: 10px;
    }
    .code-range-fields {
      display: grid;

    function nameFor(name) {
      const displayName = nameOverrides[norm(name)] || name;
      if (/^(dr\.|vet\. hekim)/i.test(displayName.trim())) return displayName;
      return `Vet. Hekim ${displayName}`;
    }

    function initialsForName(name) {
      const cleanName = name
        .replace(/^(dr\.|vet\. hekim)\s+/i, "")
        .trim();
      return cleanName
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(part => part[0]?.toLocaleUpperCase("tr-TR") || "")
        .join("");
    }

    function addonKeyForPart(part) {
      const value = norm(part).replace(/\s+/g, " ").trim();
      if (value === "i" || value === "icap") return "ICAP";
      if (value === "kedi servis") return "KEDI_SERVIS";
      if (value === "kopek servis") return "KOPEK_SERVIS";
      if (value === "enfeksiyon" || value === "enfeksiyon birimi") return "ENFEKSIYON";
      return "";
    }

    function parseRaw(raw) {
      const parts = String(raw || "").split("+").map(part => part.trim()).filter(Boolean);
      const addons = [];
      let base = "";
      parts.forEach(part => {
        const addonKey = addonKeyForPart(part);
        if (addonKey) {
          if (!addons.includes(addonKey)) addons.push(addonKey);
        } else if (!base) {
          base = part;
        }
      });
      return { base, addons };
    }

    function rawFromParts(base, addons) {
      const cleanedAddons = [...new Set(addons)];
      if (!base && cleanedAddons.length === 1 && cleanedAddons[0] === "ICAP") return "İ";
      const labels = cleanedAddons.map(key => key === "ICAP" ? "İcap" : addonOptions[key]?.storage).filter(Boolean);
      return [base, ...labels].filter(Boolean).join(" + ");
    }

    function hasAddon(raw, addonKey) {
      return parseRaw(raw).addons.includes(addonKey);
    }

    function withAddon(raw, addonKey) {
      const parsed = parseRaw(raw);
      if (!parsed.addons.includes(addonKey)) parsed.addons.push(addonKey);
      return rawFromParts(parsed.base, parsed.addons);
    }

    function withoutAddon(raw, addonKey) {
      const parsed = parseRaw(raw);
      return rawFromParts(parsed.base, parsed.addons.filter(key => key !== addonKey));
    }

    function hasIcap(raw) {
      return hasAddon(raw, "ICAP");
    }

    function baseRaw(raw) {
      return parseRaw(raw).base;
    }

    function withIcap(raw) {
      return withAddon(raw, "ICAP");
    }

    function withoutIcap(raw) {
      return withoutAddon(raw, "ICAP");
    }

    function isNightRaw(raw) {
      const value = baseRaw(raw).toUpperCase().replace(/\s/g, "");
      return /^20[-:.]?0?8$/.test(value) || value.includes("20-08") || value.includes("20-8");
    }

    function classify(raw) {
      const base = baseRaw(raw);
      const value = base.toUpperCase();
      if (!value) return "off";
      if (value === "S") return "morning";
      if (value === "A") return "evening";
      if (isNightRaw(raw)) return "night";
      if (/^(8|08|9|09)-/.test(value)) return "morning";
      if (value === "10-16") return "morning";
      if (/^(10|12|14|16)-/.test(value)) return "evening";
      return "morning";
    }

    function overrideRecordFromKey(key) {
      const dataset = allDatasets()
        .sort((a, b) => b.id.length - a.id.length)
        .find(item => key.startsWith(`${item.id}-`));
      if (!dataset) return null;
      const rest = key.slice(dataset.id.length + 1);
      const lastDash = rest.lastIndexOf("-");
      if (lastDash < 1) return null;
      const doctorId = rest.slice(0, lastDash);
      const day = Number(rest.slice(lastDash + 1));
      if (!doctorId || !Number.isInteger(day)) return null;
      return { month_key: dataset.id, doctor_id: doctorId, day };
    }

    function rawForRowDay(sicil, schedule, day) {
      const key = rowKey(sicil, day);
      if (Object.prototype.hasOwnProperty.call(overrides, key)) return overrides[key];
      return schedule[day - 1] || "";
    }

    async function syncNotificationToSupabase(item) {

        id: String(record.id),

    async function loadSupabaseNotifications({ silent = false } = {}) {
      try {
        const records = await supabaseRequest(`${notificationTable}?select=id,title,body,created_at&order=created_at.desc&limit=80`);
        if (!Array.isArray(records)) return;
        const fingerprint = JSON.stringify(records.map(record => [record.id, record.title, record.body, record.created_at]));
        if (fingerprint === lastNotificationFingerprint && silent) return;
        lastNotificationFingerprint = fingerprint;
        const localItems = savedNotifications();
        const readState = new Map(localItems.map(item => [item.id, item.read]));
        const remoteItems = records.map(record => ({
          ...notificationFromRecord(record),
          read: readState.get(String(record.id)) || false
        }));
        saveNotifications(remoteItems);
        renderNotificationBadge();
        if (!els.notificationView.hidden) renderNotificationCenter();
      } catch (error) {
        if (!silent) els.notificationStatus.textContent = `Bildirimler alınamadı: ${error.message}`;
      }
    }

    function handleSupabaseNotification(payload) {
      if (payload.eventType !== "INSERT" || !payload.new?.id) return;
      const item = notificationFromRecord(payload.new);
      upsertLocalNotification(item);

    function overrideInfoForKey(key) {
      const record = overrideRecordFromKey(key);
      if (!record) return null;
      const dataset = allDatasets().find(item => item.id === record.month_key);
      const source = dataset?.rows.find(row => row[2] === record.doctor_id);
      if (!dataset || !source) return null;
      const day = buildDays(dataset.year, dataset.monthIndex, source[3].length)[record.day - 1];
      return {
        dataset,
        source,
        day,
        originalRaw: source[3][record.day - 1] || "",
        name: nameFor(source[1])
      };
    }

    function notifyIcapDiffs(previousOverrides, nextOverrides) {
      if (!hasLoadedRemoteOverrides) return;
      const keys = new Set([...Object.keys(previousOverrides), ...Object.keys(nextOverrides)]);
      keys.forEach(key => {
        if (pendingOverrideKeys.has(key)) return;
        const info = overrideInfoForKey(key);
        if (!info) return;
        const previousRaw = Object.prototype.hasOwnProperty.call(previousOverrides, key)
          ? previousOverrides[key]
          : info.originalRaw;
        const nextRaw = Object.prototype.hasOwnProperty.call(nextOverrides, key)
          ? nextOverrides[key]
          : info.originalRaw;
        const hadIcap = hasIcap(previousRaw);
        const hasNextIcap = hasIcap(nextRaw);
        if (hadIcap === hasNextIcap) return;
        const action = hasNextIcap ? "icap eklendi" : "icap kaldırıldı";
        showShiftNotification("İcap değişikliği", `${info.name} - ${info.day.long}: ${action}.`);
      });
    }

    function notifyIcapChangeForKey(key, previousRaw, nextRaw) {
      const hadIcap = hasIcap(previousRaw);
      const hasNextIcap = hasIcap(nextRaw);
      if (hadIcap === hasNextIcap) return;
      const info = overrideInfoForKey(key);
      if (!info) return;
      const action = hasNextIcap ? "icap eklendi" : "icap kaldırıldı";
      showShiftNotification("İcap değişikliği", `${info.name} - ${info.day.long}: ${action}.`);
    }

    async function supabaseRequest(path, options = {}) {
      const method = String(options.method || "GET").toUpperCase();
      const cacheBuster = method === "GET" ? `${path.includes("?") ? "&" : "?"}_cb=${Date.now()}` : "";
      const response = await fetch(`${supabaseUrl}/rest/v1/${path}${cacheBuster}`, {
        ...options,
        cache: "no-store",
        headers: {
          apikey: supabaseKey,
          Authorization: `Bearer ${supabaseKey}`,
          "Cache-Control": "no-store",
          Pragma: "no-cache",
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });
      if (!response.ok) {
        const message = await response.text().catch(() => "");
        throw new Error(message || `Supabase hata kodu: ${response.status}`);
      }
      if (response.status === 204) return null;
      return response.json().catch(() => null);
    }

    function refreshAfterRemoteChange() {
      const profileSicil = activeProfileSicil;
      render();
      if (profileSicil) openProfile(profileSicil);
    }

    async function loadSupabaseOverrides({ replace = false, syncLocal = true, silent = false } = {}) {
      try {
        const records = await supabaseRequest(`${supabaseTable}?select=month_key,doctor_id,day,value,updated_at&order=updated_at.asc`);
        if (!Array.isArray(records)) return;
        const fingerprint = JSON.stringify(records.map(record => [
          record.month_key,
          record.doctor_id,
          record.day,
          record.value || "",
          record.updated_at || ""
        ]));
        const unchanged = fingerprint === lastRemoteFingerprint && !pendingOverrideKeys.size;
        lastRemoteFingerprint = fingerprint;
        if (unchanged && silent) return;
        const remoteOverrides = {};
        records.forEach(record => {
          remoteOverrides[overrideKey(record.month_key, record.doctor_id, record.day)] = record.value || "";
        });
        pendingOverrideKeys.forEach(key => {
          if (Object.prototype.hasOwnProperty.call(overrides, key)) remoteOverrides[key] = overrides[key];
        });
        const localOnly = syncLocal
          ? Object.entries(overrides).filter(([key]) => !Object.prototype.hasOwnProperty.call(remoteOverrides, key))
          : [];
        const previousOverrides = { ...overrides };
        const nextOverrides = replace ? remoteOverrides : { ...overrides, ...remoteOverrides };
        notifyIcapDiffs(previousOverrides, nextOverrides);
        overrides = nextOverrides;
        saveOverrides();
        hasLoadedRemoteOverrides = true;
        refreshAfterRemoteChange();
        if (syncLocal) localOnly.forEach(([key, value]) => syncOverrideToSupabase(key, value, false));
        if (!silent) setSupabaseStatus("Supabase bağlantısı aktif.");
      } catch (error) {
        if (!silent) setSupabaseStatus(`Supabase okuma hatası: ${error.message}`);
      }
    }

    async function syncOverrideToSupabase(key, value, remove = false) {
      const record = overrideRecordFromKey(key);
      if (!record) return;
      pendingOverrideKeys.add(key);
      try {
        if (remove) {
          const query = `month_key=eq.${encodeURIComponent(record.month_key)}&doctor_id=eq.${encodeURIComponent(record.doctor_id)}&day=eq.${record.day}`;
          await supabaseRequest(`${supabaseTable}?${query}`, { method: "DELETE" });
          setSupabaseStatus("Supabase değişiklik kaydedildi.");
          return;
        }
        await supabaseRequest(`${supabaseTable}?on_conflict=month_key,doctor_id,day`, {
          method: "POST",
          headers: { Prefer: "resolution=merge-duplicates,return=representation" },
          body: JSON.stringify({ ...record, value })
        });
        setSupabaseStatus("Supabase değişiklik kaydedildi.");
      } catch (error) {
        setSupabaseStatus(`Supabase yazma hatası: ${error.message}`);
      } finally {
        pendingOverrideKeys.delete(key);
      }
    }

    function handleSupabaseRealtime(payload) {
      setSupabaseStatus("Realtime değişiklik alındı.");
      if (payload.eventType === "DELETE") {
        loadSupabaseOverrides({ replace: true, syncLocal: false });
        return;
      }
      const record = payload.new;
      if (!record?.month_key || !record?.doctor_id || !record?.day) return;
      const key = overrideKey(record.month_key, record.doctor_id, record.day);
      if (pendingOverrideKeys.has(key)) return;
      const previousOverrides = { ...overrides };
      overrides[key] = record.value || "";
      notifyIcapDiffs(previousOverrides, overrides);
      saveOverrides();
      refreshAfterRemoteChange();
    }

    function startSupabaseRealtime() {
      if (!supabaseClient) {
        if (els.importStatus) els.importStatus.textContent = "Realtime istemcisi yüklenemedi.";
        return;
      }
      supabaseRealtimeChannel = supabaseClient
        .channel("shift-overrides-realtime")
        .on("postgres_changes", {
          event: "*",
          schema: "public",
          table: supabaseTable
        }, handleSupabaseRealtime)
        .subscribe(status => {
        if (status === "SUBSCRIBED") setSupabaseStatus("Supabase realtime aktif.");
        if (status === "CHANNEL_ERROR") setSupabaseStatus("Supabase realtime bağlantısı kurulamadı.");
      });
      supabaseNotificationChannel = supabaseClient
        .channel("shift-notifications-realtime")
        .on("postgres_changes", {
          event: "INSERT",
          schema: "public",
          table: notificationTable
        }, handleSupabaseNotification)
        .subscribe(status => {
          if (status === "CHANNEL_ERROR") els.notificationStatus.textContent = "Bildirim realtime bağlantısı kurulamadı.";
        });
    }

    function saveOverrideValue(key, value, remove = false) {
      const info = overrideInfoForKey(key);
      const previousRaw = Object.prototype.hasOwnProperty.call(overrides, key)
        ? overrides[key]
        : info?.originalRaw || "";
      const nextRaw = remove ? info?.originalRaw || "" : value;
      if (remove) {
        delete overrides[key];
      } else {
        overrides[key] = value;
      }
      saveOverrides();
      notifyIcapChangeForKey(key, previousRaw, nextRaw);
      syncOverrideToSupabase(key, value, false);
    }

    function daysInMonth(year, monthIndex) {

    function labelForMonth(year, monthIndex) {

      const monthName = date.toLocaleDateString("tr-TR", { month: "long" });

    }

    function dateValueForDay(day) {

    function dayFromDateValue(value) {

      if (Number.isNaN(date.getTime())) return null;
      if (date.getFullYear() !== activeDataset.year || date.getMonth() !== activeDataset.monthIndex) return null;
      return date.getDate();
    }

    function saveDatasets() {

    function allDatasets() {
      const custom = customDatasets.filter(dataset => dataset.id !== julyDataset.id && dataset.label !== julyDataset.label);
      return [builtInDataset, julyDataset, ...custom];
    }

    function parseCsv(text) {
      const parsed = [];
      let row = [];
      let value = "";
      let quoted = false;
      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];
        if (quoted) {
          if (char === '"' && next === '"') {
            value += '"';
            i += 1;
          } else if (char === '"') {
            quoted = false;
          } else {
            value += char;
          }
        } else if (char === '"') {
          quoted = true;
        } else if (char === "," || char === ";") {
          row.push(value.trim());
          value = "";
        } else if (char === "\n") {
          row.push(value.trim());
          parsed.push(row);
          row = [];
          value = "";
        } else if (char !== "\r") {
          value += char;
        }
      }
      row.push(value.trim());
      parsed.push(row);
      return parsed.filter(items => items.some(Boolean));
    }

    function csvToRows(text) {
      const parsed = parseCsv(text);
      const body = parsed[0]?.some(cell => /ad|soyad|sicil|bölüm|bolum/i.test(cell))
        ? parsed.slice(1)
        : parsed;
      return body
        .filter(row => row[1])
        .map(row => [
          row[0] || "Genel",
          row[1] || "",
          row[2] || "",
          row.slice(4).map(cell => cell.trim())
        ]);
    }

      activeDays = buildDays(activeDataset.year, activeDataset.monthIndex, daysInMonth(activeDataset.year, activeDataset.monthIndex));
      state.day = Math.min(dayForDataset(activeDataset), activeDays.length);

    function displayCode(raw, shift) {
      const base = baseRaw(raw);
      let label = "İzin";
      if (base.toUpperCase() === "S") label = "08-16";
      else if (base.toUpperCase() === "A") label = "14-22";
      else if (base) label = base;
      return label;
    }

    function codeClass(raw, shift) {
      const value = baseRaw(raw);
      if (value === "10-20") return "midshift";
      if (value === "8-20" || value === "08-20") return "evening";
      return shiftInfo[shift].className;
    }

    function codeChoices(raw) {
      const value = baseRaw(raw);
      const choices = codeOptions.map(option => {
        if (option.value !== "İ") return option;
        return { value: "İ", label: hasIcap(raw) ? "İcap kaldır" : "İcap ekle" };
      }).map(option => {
        const addon = addonOptions[option.value];
        if (!addon) return option;
        return {
          value: option.value,
          label: hasAddon(raw, option.value) ? `${addon.label} kaldır` : `${option.label} ekle`
        };
      });
      return choices.some(option => option.value === value)
        ? choices
        : [...choices, { value, label: value }];
    }

    function addonBadges(raw) {
      return parseRaw(raw).addons
        .filter(key => key !== "ICAP" && addonOptions[key])
        .map(key => addonOptions[key]);
    }

    function rowMatchesShift(row, shift) {
      if (shift === "icap") return hasIcap(row.raw);
      if (addonOptions[shift]) return hasAddon(row.raw, shift);
      return row.shift === shift;
    }

    function selectedRows() {
      const query = norm(state.query);
      return activeDataset.rows
        .map(([section, name, sicil, schedule]) => {
          const raw = rawForRow(sicil, schedule);
          const shift = classify(raw);
          const specialty = specialtyFor(name);
          section = sectionFor(section, name);
          name = nameFor(name);
          return { section, specialty, name, sicil, raw, shift };
        })
        .filter(row => rowMatchesShift(row, state.shift))
        .filter(row => !query || norm(`${row.name} ${row.section} ${row.specialty} ${row.sicil}`).includes(query));
    }

    function rowsForShift(shift, queryText = state.query) {
      const query = norm(queryText);
      return activeDataset.rows
        .map(([section, name, sicil, schedule]) => {
          const raw = rawForRow(sicil, schedule);
          const rowShift = classify(raw);
          const specialty = specialtyFor(name);
          section = sectionFor(section, name);
          name = nameFor(name);
          return { section, specialty, name, sicil, raw, shift: rowShift };
        })
        .filter(row => rowMatchesShift(row, shift))
        .filter(row => !query || norm(`${row.name} ${row.section} ${row.specialty} ${row.sicil}`).includes(query));
    }

    function workingDoctorCount() {
      return activeDataset.rows
        .map(([, , sicil, schedule]) => rawForRow(sicil, schedule))
        .filter(raw => ["morning", "evening", "night"].includes(classify(raw)))
        .length;
    }

    function profileRowForSicil(sicil) {
      const source = activeDataset.rows.find(row => row[2] === sicil);
      if (!source) return null;
      const [section, originalName, rowSicil, schedule] = source;
      return {
        section: sectionFor(section, originalName),
        specialty: specialtyFor(originalName),
        name: nameFor(originalName),
        sicil: rowSicil,
        schedule
      };
    }

    function profileEntries(row) {
      return activeDays.map(day => {
        const raw = rawForRowDay(row.sicil, row.schedule, day.day);
        const shift = classify(raw);
        return {
          day,
          raw,
          shift,
          icap: hasIcap(raw),
          label: displayCode(raw, shift),
          className: codeClass(raw, shift)
        };
      });
    }

    function profileStats(entries) {
      return {
        morning: entries.filter(item => item.shift === "morning").length,
        evening: entries.filter(item => item.shift === "evening").length,
        night: entries.filter(item => item.shift === "night").length,
        icap: entries.filter(item => item.icap).length,
        off: entries.filter(item => item.shift === "off").length
      };
    }

    function profileDateLabel(day) {
      const date = new Date(activeDataset.year, activeDataset.monthIndex, day.day);
      return date.toLocaleDateString("tr-TR", { weekday: "long", month: "long" });
    }

      document.getElementById("profileBackButton").addEventListener("click", closeProfile);
      els.profileView.querySelectorAll("[data-profile-code]").forEach(button => {
        button.addEventListener("click", () => {
          if (!isAdminUser()) return;
          profileEditContext = {
            sicil: row.sicil,
            editedDay: Number(button.dataset.day),
            previousDay: state.day
          };
          state.day = Number(button.dataset.day);
          openCodeMenu(button);
        });
      });
    }

    function closeProfile() {
      activeProfileSicil = null;
      els.app.classList.remove("profile-mode");
      els.profileView.hidden = true;
      els.profileView.innerHTML = "";
    }

    function shiftForQuery(queryText) {
      if (!queryText.trim()) return state.shift;
      if (rowsForShift(state.shift, queryText).length) return state.shift;
      return shiftOrder.find(shift => rowsForShift(shift, queryText).length) || state.shift;
    }

    function importCsvText(text) {
      const monthValue = els.importMonth.value;
      if (!monthValue) {
        els.importStatus.textContent = "Ay seçimi gerekli.";
        return;
      }
      if (!text.trim()) {
        els.importStatus.textContent = "CSV içeriği bulunamadı.";
        return;
      }
      const [yearText, monthText] = monthValue.split("-");
      const year = Number(yearText);
      const monthIndex = Number(monthText) - 1;
      const label = labelForMonth(year, monthIndex);
      try {
        const importedRows = csvToRows(text);
        if (!importedRows.length) {
          els.importStatus.textContent = "CSV içinde vardiya satırı bulunamadı.";
          return;
        }
        const dataset = {
          id: `dataset-${Date.now()}`,
          label,
          year,
          monthIndex,
          rows: importedRows
        };
        customDatasets = customDatasets.filter(item => item.label !== label);
        customDatasets.unshift(dataset);
        saveDatasets();
        els.importFile.value = "";
        els.importText.value = "";
        els.importStatus.textContent = `${label} yüklendi: ${importedRows.length} hekim.`;
        selectDataset(dataset.id);
      } catch {
        els.importStatus.textContent = "CSV okunamadı.";
      }
    }

    function renderDays() {
      els.dayStrip.innerHTML = "";
      const today = todayForDataset(activeDataset);
      activeDays.forEach(day => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "day"
          + (day.day === state.day ? " active" : "")
          + (day.day === today ? " today" : "");
        if (day.day === today) button.setAttribute("aria-label", `${day.long}, bugün`);
        button.innerHTML = `<strong>${day.day}</strong><span>${day.short}</span>`;
        button.addEventListener("click", () => {
          state.day = day.day;
          render();
          alignSelectedDay("smooth");
        });
        els.dayStrip.appendChild(button);
      });
    }

    function alignSelectedDay(behavior = "auto") {
      const selected = els.dayStrip.querySelector(".day.active");
      if (!selected) return;
      const stripRect = els.dayStrip.getBoundingClientRect();
      const dayRect = selected.getBoundingClientRect();
      const isOutside = dayRect.left < stripRect.left || dayRect.right > stripRect.right;
      if (!isOutside) return;
      const targetLeft = selected.offsetLeft + selected.offsetWidth - els.dayStrip.clientWidth;
      els.dayStrip.scrollTo({ left: Math.max(0, targetLeft), behavior });
    }

    function renderTabs() {
      els.tabs.forEach(tab => tab.classList.toggle("active", tab.dataset.shift === state.shift));
      els.morningTabCount.textContent = `${rowsForShift("morning", "").length} kişi`;
      els.eveningTabCount.textContent = `${rowsForShift("evening", "").length} kişi`;
      els.nightTabCount.textContent = `${rowsForShift("night", "").length} kişi`;
      els.icapTabCount.textContent = `${rowsForShift("icap", "").length} kişi`;
      els.offTabCount.textContent = `${rowsForShift("off", "").length} kişi`;
      els.catServiceTabCount.textContent = `${rowsForShift("KEDI_SERVIS", "").length} kişi`;
      els.dogServiceTabCount.textContent = `${rowsForShift("KOPEK_SERVIS", "").length} kişi`;
      els.infectionTabCount.textContent = `${rowsForShift("ENFEKSIYON", "").length} kişi`;
    }

    function renderList() {
      const list = selectedRows();
      const info = shiftInfo[state.shift];
      const day = activeDays[state.day - 1];
      els.activeShiftLabel.textContent = `${info.label} şifti`;
      els.dateTitle.innerHTML = `${day.long}${day.day === todayForDataset(activeDataset) ? '<span class="today-badge">Bugün</span>' : ""}`;
      els.prevDay.disabled = state.day <= 1;
      els.nextDay.disabled = state.day >= activeDays.length;
      els.countLabel.textContent = `${workingDoctorCount()} çalışan hekim`;
      els.ruleLabel.textContent = info.rule;
      els.doctorList.innerHTML = "";
      if (!list.length) {
        els.doctorList.innerHTML = `<div class="empty">Bu filtrede hekim bulunamadı.</div>`;
        return;
      }
      let currentSection = "";
      const canEditShifts = isAdminUser();
      list.forEach(row => {
        if (row.section !== currentSection) {
          currentSection = row.section;
          const title = document.createElement("h3");
          title.className = "section-title";
          title.textContent = currentSection;
          els.doctorList.appendChild(title);
        }
        const item = document.createElement("div");
        item.className = "doctor";
        const icapBadge = hasIcap(row.raw) ? `<span class="list-badge icap-badge">İcap</span>` : "";
        const serviceBadges = addonBadges(row.raw)
          .map(addon => `<span class="list-badge ${addon.className}">${addon.label}</span>`)
          .join("");
        const readOnlyClass = canEditShifts ? "" : " readonly";
        const readOnlyAttrs = canEditShifts ? "" : " disabled";
        item.innerHTML = `
          <span><button class="doctor-name" type="button" data-sicil="${row.sicil}"><b>${row.name}</b></button>${icapBadge}${serviceBadges}<small>${row.specialty}</small></span>
          <button class="code-button ${codeClass(row.raw, row.shift)}${readOnlyClass}" type="button" data-sicil="${row.sicil}" data-name="${row.name}" data-value="${row.raw}" aria-label="${row.name} vardiya seç"${readOnlyAttrs}>
            ${displayCode(row.raw, row.shift)}
          </button>
        `;
        els.doctorList.appendChild(item);
      });
    }

    function render() {
      renderDays();
      renderTabs();
      renderList();
      requestAnimationFrame(() => alignSelectedDay());
    }

    function goHome() {
      closeProfile();
      closeNotificationCenter();
      closeDrawer();
      closeCodeMenu();
      state.day = Math.min(dayForDataset(activeDataset), activeDays.length);
      state.shift = "morning";
      state.query = "";
      els.search.value = "";
      render();
    }

    function selectShiftFromEvent(event) {
      const tab = event.target.closest(".shift-tab");
      if (!tab) return;
      state.shift = tab.dataset.shift;
      render();
    }

    function openDrawer() {
      els.drawer.classList.add("open");
      els.drawer.setAttribute("aria-hidden", "false");
      els.drawerBackdrop.hidden = false;
    }

    function closeDrawer() {
      els.drawer.classList.remove("open");
      els.drawer.setAttribute("aria-hidden", "true");
      els.drawerBackdrop.hidden = true;
    }

    function changeDay(delta) {
      const nextDay = Math.min(activeDays.length, Math.max(1, state.day + delta));
      if (nextDay === state.day) return;
      state.day = nextDay;
      render();
      alignSelectedDay("smooth");
    }

    function renderAfterCodeEdit(sicil) {
      const context = profileEditContext;
      profileEditContext = null;
      render();
      if (context?.sicil) {
        openProfile(context.sicil);
        state.day = context.previousDay;
        requestAnimationFrame(() => {
          const edited = els.profileView.querySelector(`[data-profile-code][data-day="${context.editedDay}"]`);
          edited?.scrollIntoView({ block: "center" });
        });
      }
    }

    function applyShiftValue(sicil, value, currentValue) {
      let nextValue = value;
      if (value === "İ") {
        openIcapRangeMenu(sicil, currentValue);
        return;
      } else if (addonOptions[value]) {
        nextValue = hasAddon(currentValue, value) ? withoutAddon(currentValue, value) : withAddon(currentValue, value);
        saveOverrideValue(rowKey(sicil, state.day), nextValue);
        closeCodeMenu();
        renderAfterCodeEdit(sicil);
        return;
      } else {
        nextValue = rawFromParts(value, parseRaw(currentValue).addons);
      }
      saveOverrideValue(rowKey(sicil, state.day), nextValue);
      state.shift = classify(nextValue);
      closeCodeMenu();
      renderAfterCodeEdit(sicil);
    }

    function applyIcapRange(sicil, mode, startDay, endDay) {
      const row = activeDataset.rows.find(items => items[2] === sicil);
      if (!row) return;
      const schedule = row[3];
      const firstDay = Math.min(startDay, endDay);
      const lastDay = Math.max(startDay, endDay);
      for (let day = firstDay; day <= lastDay; day += 1) {
        const original = schedule[day - 1] || "";
        const current = rawForRowDay(sicil, schedule, day);
        const next = mode === "add" ? withIcap(current) : withoutIcap(current);
        const key = rowKey(sicil, day);
        if (next === original) {
          saveOverrideValue(key, next, true);
        } else {
          saveOverrideValue(key, next);
        }
      }
      closeCodeMenu();
      renderAfterCodeEdit(sicil);
    }

    function openIcapRangeMenu(sicil, currentValue) {
      const mode = hasIcap(currentValue) ? "remove" : "add";
      const minDate = dateValueForDay(1);
      const maxDate = dateValueForDay(activeDays.length);
      const selectedDate = dateValueForDay(state.day);
      els.codeMenuTitle.textContent = mode === "add" ? "İcap tarih aralığı" : "İcap kaldır";
      els.codeMenuOptions.classList.add("range-mode");
      els.codeMenuOptions.innerHTML = `
        <div class="code-range">
          <div class="code-range-fields">
            <label>Başlangıç<input id="icapStartDate" type="date" min="${minDate}" max="${maxDate}" value="${selectedDate}"></label>
            <label>Bitiş<input id="icapEndDate" type="date" min="${minDate}" max="${maxDate}" value="${selectedDate}"></label>
          </div>
          <button id="icapRangeApply" class="code-range-apply" type="button">${mode === "add" ? "İcap ekle" : "İcap kaldır"}</button>
          <div id="icapRangeError" class="code-range-error"></div>
        </div>
      `;
      const startInput = document.getElementById("icapStartDate");
      const endInput = document.getElementById("icapEndDate");
      const error = document.getElementById("icapRangeError");
      document.getElementById("icapRangeApply").addEventListener("click", () => {
        const startDay = dayFromDateValue(startInput.value);
        const endDay = dayFromDateValue(endInput.value);
        if (!startDay || !endDay) {
          error.textContent = "Tarihler seçili ay içinde olmalı.";
          return;
        }
        applyIcapRange(sicil, mode, startDay, endDay);
      });
    }

    function openCodeMenu(button) {
      const sicil = button.dataset.sicil;
      const currentValue = button.dataset.value || "";
      els.codeMenuTitle.textContent = button.dataset.name || "Vardiya seç";
      els.codeMenuOptions.innerHTML = "";
      els.codeMenuOptions.classList.remove("range-mode");
      codeChoices(currentValue).forEach(option => {
        const choice = document.createElement("button");
        choice.type = "button";
        const isActive = option.value === "İ"
          ? hasIcap(currentValue)
          : addonOptions[option.value]
            ? hasAddon(currentValue, option.value)
            : option.value === baseRaw(currentValue);
        choice.className = "code-choice" + (isActive ? " active" : "");
        choice.textContent = option.label;
        choice.dataset.value = option.value;
        choice.addEventListener("click", () => applyShiftValue(sicil, option.value, currentValue));
        els.codeMenuOptions.appendChild(choice);
      });
      els.codeMenu.hidden = false;
      els.codeMenuBackdrop.hidden = false;
      els.codeMenu.setAttribute("aria-hidden", "false");
    }

    function closeCodeMenu() {
      els.codeMenu.hidden = true;
      els.codeMenuBackdrop.hidden = true;
      els.codeMenu.setAttribute("aria-hidden", "true");
      els.codeMenuOptions.innerHTML = "";
      els.codeMenuOptions.classList.remove("range-mode");
    }

    document.querySelectorAll(".shift-tabs").forEach(tabGroup => {
      tabGroup.addEventListener("click", selectShiftFromEvent);
      tabGroup.addEventListener("touchend", event => {
        event.preventDefault();
        selectShiftFromEvent(event);
      }, { passive: false });
    });
    els.search.addEventListener("input", () => {
      state.query = els.search.value;
      state.shift = shiftForQuery(state.query);
      renderTabs();
      renderList();
    });
    els.today.addEventListener("click", () => {
      state.day = Math.min(dayForDataset(activeDataset), activeDays.length);
      render();
    });
    els.prevDay.addEventListener("click", () => changeDay(-1));
    els.nextDay.addEventListener("click", () => changeDay(1));
    els.doctorList.addEventListener("click", event => {
      const nameButton = event.target.closest(".doctor-name");
      if (nameButton) {
        openProfile(nameButton.dataset.sicil);
        return;
      }
      const button = event.target.closest(".code-button");
      if (!button) return;
      if (!isAdminUser()) return;
      profileEditContext = null;
      openCodeMenu(button);
    });
    els.codeMenuClose.addEventListener("click", () => {
      profileEditContext = null;
      closeCodeMenu();
    });
    els.codeMenuBackdrop.addEventListener("click", () => {
      profileEditContext = null;
      closeCodeMenu();
    });
    els.importButton.addEventListener("click", () => {
      const file = els.importFile.files[0];
      if (!file || !els.importMonth.value) {
        els.importStatus.textContent = "Ay seçimi ve CSV dosyası gerekli.";
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        importCsvText(String(reader.result || ""));
      };
      reader.onerror = () => {
        els.importStatus.textContent = "CSV dosyası açılamadı.";
      };
      reader.readAsText(file, "utf-8");
    });
    els.importTextButton.addEventListener("click", () => {
      importCsvText(els.importText.value);
    });
    els.resetOverridesButton.addEventListener("click", resetManualOverrides);
    els.notificationButton.addEventListener("click", requestNotifications);
    els.notificationTestButton.addEventListener("click", testNotifications);
    els.authForm.addEventListener("submit", event => {
      event.preventDefault();
      if (els.authScreen.classList.contains("register-mode")) {
        registerUser();
        return;
      }
      const username = els.authUsername.value.trim().toLocaleLowerCase("tr-TR");
      if (isValidLogin(username, els.authPassword.value)) {
        saveAuth(username);
        unlockApp();
        return;
      }
      els.authError.textContent = "Kullanıcı adı veya şifre hatalı.";
      els.authPassword.value = "";
      els.authPassword.focus();
    });
    els.showRegisterButton.addEventListener("click", showRegisterScreen);
    els.showLoginButton.addEventListener("click", showLoginScreen);
    els.createAccountButton.addEventListener("click", registerUser);
    els.logoutButton.addEventListener("click", lockApp);
    els.datasetSelect.addEventListener("change", () => {
      selectDataset(els.datasetSelect.value);
    });
    els.monthSelect.addEventListener("change", () => {
      selectDataset(els.monthSelect.value);
    });
    els.homeButton.addEventListener("click", goHome);
    els.notificationCenterButton.addEventListener("click", openNotificationCenter);
    els.menuButton.addEventListener("click", openDrawer);
    els.drawerClose.addEventListener("click", closeDrawer);
    els.drawerBackdrop.addEventListener("click", closeDrawer);
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeDrawer();
        profileEditContext = null;
        closeCodeMenu();
      }
    });
    window.addEventListener("focus", syncWhenAppBecomesActive);
    window.addEventListener("pageshow", forceSupabaseRefresh);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) syncWhenAppBecomesActive();
    });
    renderDatasetSelect();
    renderAppVersion();
    renderNotificationBadge();
    updateNotificationStatus();
    render();
    initAuth();
    loadSupabaseOverrides({ replace: true, syncLocal: false });
    loadSupabaseNotifications({ silent: false });
    startSupabaseRealtime();
    startSupabasePollingFallback();
  </script>
</body>
</html>
